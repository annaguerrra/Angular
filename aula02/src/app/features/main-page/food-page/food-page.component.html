<div class="container">
    <h1 class="title">Menu</h1>
    <div class="dish">
        <app-card-food 
            *ngFor="let sushi of dishes; track: $index"
            [dishe]="sushi" 
            (onClick)="openModal(sushi)">
        </app-card-food>
    </div>
</div>
<app-food-details-modal
    *ngIf="isClicked"
    [dishe]="selectedDish"
    (close)="closeModal()">
</app-food-details-modal>
