<div class="container">
    <h1 class="title">Menu</h1>
    <div class="dish">
        <app-card-food 
            *ngFor="let sushi of dishes; track: $index"
            [dishe]="sushi" 
            (onClick)="onCardClick(sushi)">
        </app-card-food>
    </div>
</div>
<app-modal
    *ngIf="focusedFood"
    (onClose)="focusedFood = undefined"
    [Confirmation]="true"
    [Title]="">

</app-modal>
